name: Update AI Intel Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 10 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check Chicago schedule
        id: schedule
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          schedule="${{ github.event.schedule }}"
          zone="$(TZ=America/Chicago date +%Z)"
          if [ "$schedule" = "0 9 * * *" ] && [ "$zone" = "CDT" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$schedule" = "0 10 * * *" ] && [ "$zone" != "CDT" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automation
        if: steps.schedule.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Check out Pages branch
        if: steps.schedule.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Set up Python
        if: steps.schedule.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate free-source AI feed and archive
        if: steps.schedule.outputs.run == 'true'
        run: |
          python3 source/scripts/generate_ai_intel_feed.py \
            --output pages/ai-intel-daily/data/ai-feed.json \
            --archive-dir pages/ai-intel-daily/archive \
            --include-failures

      - name: Commit updated Pages data
        if: steps.schedule.outputs.run == 'true'
        working-directory: pages
        run: |
          if git diff --quiet -- ai-intel-daily/data/ai-feed.json ai-intel-daily/archive; then
            echo "No feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-intel-daily/data/ai-feed.json ai-intel-daily/archive
          git commit -m "Update AI Intel Daily feed"
          git push origin gh-pages
