name: Update Options Credit Scanner

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These times match 9:15 AM, 12:00 PM, and 2:30 PM
    # Central Daylight Time. The script still uses Chicago timestamps.
    - cron: "15 14 * * 1-5"
    - cron: "0 17 * * 1-5"
    - cron: "30 19 * * 1-5"

permissions:
  contents: write

jobs:
  update-options-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Check out app source
        uses: actions/checkout@v4
        with:
          ref: main
          path: source

      - name: Check out Pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanner dependencies
        working-directory: source
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Publish static app files
        run: |
          mkdir -p pages/options-credit-scanner
          rsync -a --delete \
            --exclude screenshots \
            --exclude data/latest.json \
            source/options-credit-scanner/ pages/options-credit-scanner/

      - name: Generate live scanner data
        working-directory: source
        run: |
          python options-credit-scanner/scanner.py \
            --output ../pages/options-credit-scanner/data/latest.json

      - name: Commit updated Pages app
        working-directory: pages
        run: |
          if git diff --quiet -- options-credit-scanner; then
            echo "No options scanner changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add options-credit-scanner
          git commit -m "Update options credit scanner"
          git push origin gh-pages
